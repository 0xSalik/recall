<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>recall</title>
<style>
  :root {
    --bg: #0d1017;
    --panel: #151a23;
    --border: #232a36;
    --fg: #d8dee9;
    --muted: #7a8290;
    --accent: #7aa2f7;
    --accent-dim: #2a3450;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  #app { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
  header {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 24px;
  }
  h1 { font-size: 20px; margin: 0; letter-spacing: 1px; }
  h1::before { content: "› "; color: var(--accent); }
  #status { color: var(--muted); font-size: 12px; }
  #search { display: flex; flex-direction: column; gap: 10px; }
  textarea {
    width: 100%; resize: vertical; background: var(--panel); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; padding: 12px;
    font: inherit; outline: none;
  }
  textarea:focus { border-color: var(--accent-dim); }
  .row { display: flex; gap: 10px; align-items: center; }
  button {
    background: var(--accent-dim); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 18px; font: inherit; cursor: pointer;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: .5; cursor: default; }
  label.k { color: var(--muted); font-size: 12px; }
  input[type=number] {
    width: 56px; background: var(--panel); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px; font: inherit;
  }
  #answer {
    margin-top: 28px; white-space: pre-wrap; min-height: 1em;
    border-left: 2px solid var(--accent-dim); padding-left: 16px;
  }
  #answer.empty { color: var(--muted); border-color: var(--border); }
  .cursor::after { content: "▋"; color: var(--accent); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  #sources { margin-top: 28px; }
  #sources h2 { font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }
  .source {
    display: flex; justify-content: space-between; gap: 12px;
    padding: 8px 12px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; margin-bottom: 6px;
  }
  .source .path { word-break: break-all; }
  .badge {
    flex: none; color: var(--accent); border: 1px solid var(--accent-dim);
    border-radius: 4px; padding: 1px 8px; font-size: 12px; height: fit-content;
  }
  .links { display: flex; gap: 14px; align-items: baseline; }
  .link {
    color: var(--muted); font-size: 12px; background: none; border: none;
    padding: 0; cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
  }
  .link:hover { color: var(--accent); }
  #manage { display: none; margin-bottom: 24px; border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; background: var(--panel); }
  #manage.open { display: block; }
  #manage .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  #manage .toolbar .spacer { flex: 1; }
  button.danger { border-color: #5a2a2a; color: #f7a2a2; }
  button.danger:hover:not(:disabled) { border-color: #e06c6c; }
  button.small { padding: 4px 10px; font-size: 12px; }
  #fileList { display: flex; flex-direction: column; gap: 6px; max-height: 340px; overflow-y: auto; }
  .file {
    display: flex; align-items: center; gap: 10px; padding: 7px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  }
  .file .path { flex: 1; word-break: break-all; }
  .file .count { flex: none; color: var(--muted); font-size: 12px; }
  #manageMsg { color: var(--muted); font-size: 12px; margin-top: 10px; min-height: 1em; }
  #manageMsg.err { color: #f7a2a2; }
</style>
</head>
<body>
  <div id="app">
    <header>
      <h1>recall</h1>
      <div class="links">
        <button id="manageToggle" class="link">manage index</button>
        <span id="status">connecting…</span>
      </div>
    </header>

    <div id="manage">
      <div class="toolbar">
        <button id="refreshBtn" class="small">↻ Refresh</button>
        <span class="spacer"></span>
        <button id="clearBtn" class="small danger">Clear all</button>
      </div>
      <div id="fileList"></div>
      <div id="manageMsg"></div>
    </div>

    <div id="search">
      <textarea id="question" rows="3" placeholder="Ask anything about your files…"></textarea>
      <div class="row">
        <button id="submit">Search</button>
        <label class="k">chunks (k): <input id="k" type="number" min="1" max="20" value="5" /></label>
      </div>
    </div>
    <div id="answer" class="empty">Answers stream here as the model generates them.</div>
    <div id="sources"></div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const answerEl = $("answer");
const sourcesEl = $("sources");
const submitEl = $("submit");

async function refreshStatus() {
  try {
    const r = await fetch("/status");
    const s = await r.json();
    $("status").textContent = `${s.files} files · ${s.chunks} chunks`;
  } catch {
    $("status").textContent = "server unavailable";
  }
}

function renderSources(sources) {
  sourcesEl.innerHTML = "";
  if (!sources || !sources.length) return;
  const h = document.createElement("h2");
  h.textContent = "Sources";
  sourcesEl.appendChild(h);
  for (const s of sources) {
    const div = document.createElement("div");
    div.className = "source";
    const path = document.createElement("span");
    path.className = "path";
    path.textContent = s.page > 0 ? `${s.source}, page ${s.page}` : s.source;
    const badge = document.createElement("span");
    badge.className = "badge";
    badge.textContent = s.score.toFixed(2);
    div.append(path, badge);
    sourcesEl.appendChild(div);
  }
}

// Parse a growing SSE buffer, returning [events, remainder]. Events are
// separated by a blank line; we only care about "data:" lines.
function parseSSE(buffer) {
  const events = [];
  let idx;
  while ((idx = buffer.indexOf("\n\n")) !== -1) {
    const raw = buffer.slice(0, idx);
    buffer = buffer.slice(idx + 2);
    for (const line of raw.split("\n")) {
      if (line.startsWith("data:")) {
        const json = line.slice(5).trim();
        if (json) { try { events.push(JSON.parse(json)); } catch {} }
      }
    }
  }
  return [events, buffer];
}

async function ask() {
  const question = $("question").value.trim();
  if (!question) return;
  const k = parseInt($("k").value, 10) || 5;

  submitEl.disabled = true;
  sourcesEl.innerHTML = "";
  answerEl.classList.remove("empty");
  answerEl.classList.add("cursor");
  answerEl.textContent = "";

  try {
    const resp = await fetch("/query", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
      body: JSON.stringify({ question, k }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    for (;;) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      let events;
      [events, buffer] = parseSSE(buffer);
      for (const ev of events) {
        if (ev.error) { answerEl.textContent += `\n[error: ${ev.error}]`; continue; }
        if (ev.done) { renderSources(ev.sources); }
        else if (ev.token) { answerEl.textContent += ev.token; }
      }
    }
  } catch (e) {
    answerEl.textContent = `request failed: ${e}`;
  } finally {
    answerEl.classList.remove("cursor");
    submitEl.disabled = false;
  }
}

submitEl.addEventListener("click", ask);
$("question").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") ask();
});

// ---- Index management ----
const manageEl = $("manage");
const fileListEl = $("fileList");
const manageMsgEl = $("manageMsg");

function setMsg(text, isErr) {
  manageMsgEl.textContent = text || "";
  manageMsgEl.classList.toggle("err", !!isErr);
}

async function loadFiles() {
  setMsg("loading…");
  try {
    const r = await fetch("/files");
    const data = await r.json();
    const files = data.files || [];
    fileListEl.innerHTML = "";
    if (!files.length) {
      setMsg("No files indexed.");
      return;
    }
    for (const f of files) {
      const row = document.createElement("div");
      row.className = "file";
      const path = document.createElement("span");
      path.className = "path";
      path.textContent = f.path;
      const count = document.createElement("span");
      count.className = "count";
      count.textContent = `${f.chunks} chunks`;
      const btn = document.createElement("button");
      btn.className = "small danger";
      btn.textContent = "remove";
      btn.addEventListener("click", () => removeFile(f.path, btn));
      row.append(path, count, btn);
      fileListEl.appendChild(row);
    }
    setMsg(`${files.length} files indexed.`);
  } catch (e) {
    setMsg(`failed to load files: ${e}`, true);
  }
}

async function removeFile(path, btn) {
  if (btn) btn.disabled = true;
  setMsg("removing…");
  try {
    const r = await fetch("/remove", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path }),
    });
    if (!r.ok) throw new Error(await r.text());
    const res = await r.json();
    setMsg(`removed ${res.removedFiles} file(s), ${res.removedChunks} chunk(s).`);
    await loadFiles();
    refreshStatus();
  } catch (e) {
    setMsg(`remove failed: ${e}`, true);
    if (btn) btn.disabled = false;
  }
}

async function refreshIndex() {
  const btn = $("refreshBtn");
  btn.disabled = true;
  setMsg("refreshing (pruning deleted, reindexing changed)…");
  try {
    const r = await fetch("/refresh", { method: "POST" });
    if (!r.ok) throw new Error(await r.text());
    const res = await r.json();
    setMsg(`refresh done: ${res.pruned} pruned, ${res.indexed} reindexed.`);
    await loadFiles();
    refreshStatus();
  } catch (e) {
    setMsg(`refresh failed: ${e}`, true);
  } finally {
    btn.disabled = false;
  }
}

async function clearIndex() {
  if (!confirm("Remove ALL indexed files? This cannot be undone.")) return;
  const btn = $("clearBtn");
  btn.disabled = true;
  setMsg("clearing…");
  try {
    const r = await fetch("/clear", { method: "POST" });
    if (!r.ok) throw new Error(await r.text());
    setMsg("index cleared.");
    await loadFiles();
    refreshStatus();
  } catch (e) {
    setMsg(`clear failed: ${e}`, true);
  } finally {
    btn.disabled = false;
  }
}

$("manageToggle").addEventListener("click", () => {
  const open = manageEl.classList.toggle("open");
  $("manageToggle").textContent = open ? "hide index" : "manage index";
  if (open) loadFiles();
});
$("refreshBtn").addEventListener("click", refreshIndex);
$("clearBtn").addEventListener("click", clearIndex);

refreshStatus();
</script>
</body>
</html>
